<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Ocean of Bhagavad Gita - Teaching Content" />
        <meta name="author" content="" />
        <title>Ocean of Bhagavad Gita - Teaching</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Simple line icons-->
        <link href="https://cdnjs.cloudflare.com/ajax/libs/simple-line-icons/2.5.5/css/simple-line-icons.min.css" rel="stylesheet" />
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,700,300italic,400italic,700italic" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Crimson+Text:wght@400;600;700&display=swap" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="assets/css/styles.css" rel="stylesheet" />
        <!-- Ocean of Gita Custom Styles -->
        <link href="assets/css/ocean-of-gita.css" rel="stylesheet" />
        <!-- Teaching Page CSS -->
        <link href="assets/css/teaching.css" rel="stylesheet" />
    </head>
    <body id="page-top">
        <!-- Navigation-->
        <a class="menu-toggle rounded" href="#"><i class="fas fa-bars"></i></a>
        <nav id="sidebar-wrapper">
            <ul class="sidebar-nav">
                <li class="sidebar-brand"><a href="index.html">Ocean of Gita</a></li>
                <li class="sidebar-nav-item"><a href="index.html">Home</a></li>
            </ul>
        </nav>

        <!-- Mode Toggle - At Top -->
        <section class="mode-section">
            <div class="container px-4 px-lg-5">
                <div class="mode-toggle-wrapper">
                    <h3 class="mode-heading">Choose Your Path</h3>
                    <div class="mode-toggle">
                        <button class="mode-btn active" data-mode="emotional">
                            <i class="fas fa-heart"></i> Emotional Mode
                        </button>
                        <button class="mode-btn" data-mode="chapter">
                            <i class="fas fa-book"></i> Chapter Wise
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Emotional Filters Section -->
        <section class="filter-section" id="emotional-filters">
            <div class="container px-4 px-lg-5">
                <div class="content-section-heading text-center">
                    <h3 class="text-secondary mb-0">How Are You Feeling?</h3>
                    <h2 class="mb-4">Select Your Emotion</h2>
                </div>
                <div class="filters-grid">
                    <button class="filter-btn" data-emotion="demotivated">
                        <i class="fas fa-tired"></i>
                        <span>Feeling Demotivated</span>
                    </button>
                    <button class="filter-btn" data-emotion="anxious">
                        <i class="fas fa-exclamation-circle"></i>
                        <span>Feeling Anxious</span>
                    </button>
                    <button class="filter-btn" data-emotion="stressed">
                        <i class="fas fa-brain"></i>
                        <span>Feeling Stressed</span>
                    </button>
                    <button class="filter-btn" data-emotion="confused">
                        <i class="fas fa-question-circle"></i>
                        <span>Feeling Confused</span>
                    </button>
                    <button class="filter-btn" data-emotion="sad">
                        <i class="fas fa-sad-tear"></i>
                        <span>Feeling Sad</span>
                    </button>
                    <button class="filter-btn" data-emotion="angry">
                        <i class="fas fa-angry"></i>
                        <span>Feeling Angry</span>
                    </button>
                    <button class="filter-btn" data-emotion="fearful">
                        <i class="fas fa-frown"></i>
                        <span>Feeling Fearful</span>
                    </button>
                    <button class="filter-btn" data-emotion="lost">
                        <i class="fas fa-compass"></i>
                        <span>Feeling Lost</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Chapter Filters Section -->
        <section class="filter-section hidden" id="chapter-filters">
            <div class="container px-4 px-lg-5">
                <div class="content-section-heading text-center">
                    <h3 class="text-secondary mb-0">Bhagavad Gita</h3>
                    <h2 class="mb-4">Select Chapter</h2>
                </div>
                <div class="chapters-grid">
                    <button class="chapter-btn" data-chapter="1">
                        <span class="chapter-num">1</span>
                        <span class="chapter-name">Arjuna Vishada Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="2">
                        <span class="chapter-num">2</span>
                        <span class="chapter-name">Sankhya Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="3">
                        <span class="chapter-num">3</span>
                        <span class="chapter-name">Karma Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="4">
                        <span class="chapter-num">4</span>
                        <span class="chapter-name">Jnana Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="5">
                        <span class="chapter-num">5</span>
                        <span class="chapter-name">Karma Sanyasa Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="6">
                        <span class="chapter-num">6</span>
                        <span class="chapter-name">Dhyana Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="7">
                        <span class="chapter-num">7</span>
                        <span class="chapter-name">Jnana Vijnana Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="8">
                        <span class="chapter-num">8</span>
                        <span class="chapter-name">Aksara Brahma Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="9">
                        <span class="chapter-num">9</span>
                        <span class="chapter-name">Raja Vidya Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="10">
                        <span class="chapter-num">10</span>
                        <span class="chapter-name">Vibhuti Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="11">
                        <span class="chapter-num">11</span>
                        <span class="chapter-name">Visvarupa Darsana Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="12">
                        <span class="chapter-num">12</span>
                        <span class="chapter-name">Bhakti Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="13">
                        <span class="chapter-num">13</span>
                        <span class="chapter-name">Ksetra Ksetrajna Vibhaga Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="14">
                        <span class="chapter-num">14</span>
                        <span class="chapter-name">Gunatraya Vibhaga Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="15">
                        <span class="chapter-num">15</span>
                        <span class="chapter-name">Purusottama Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="16">
                        <span class="chapter-num">16</span>
                        <span class="chapter-name">Daivasura Sampad Vibhaga Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="17">
                        <span class="chapter-num">17</span>
                        <span class="chapter-name">Sraddhatraya Vibhaga Yoga</span>
                    </button>
                    <button class="chapter-btn" data-chapter="18">
                        <span class="chapter-num">18</span>
                        <span class="chapter-name">Moksa Sanyasa Yoga</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Verse Display Section -->
        <section class="verse-display-section hidden" id="verse-display">
            <div class="container px-4 px-lg-5">
                <div class="verse-card">
                    <div class="verse-header">
                        <button class="back-to-filters" onclick="backToFilters()">
                            <i class="fas fa-arrow-left"></i> Back to Filters
                        </button>
                        <div class="verse-info">
                            <span class="current-filter" id="current-filter"></span>
                            <span class="verse-counter" id="verse-counter">Verse 1 of 5</span>
                        </div>
                    </div>

                    <div class="verse-content-wrapper">
                        <!-- Sanskrit Verse -->
                        <div class="verse-sanskrit-box">
                            <p class="verse-sanskrit" id="verse-sanskrit"></p>
                        </div>

                        <!-- Verse Reference -->
                        <p class="verse-reference" id="verse-reference">Chapter 2, Verse 47</p>

                        <!-- English Translation -->
                        <div class="verse-translation-box">
                            <p class="verse-translation" id="verse-translation"></p>
                        </div>

                        <!-- Story/Explanation Tabs -->
                        <div class="explanation-tabs">
                            <button class="exp-tab active" data-tab="simple">
                                <i class="fas fa-heart"></i> Simple Story
                            </button>
                            <button class="exp-tab" data-tab="advanced">
                                <i class="fas fa-graduation-cap"></i> Deep Meaning
                            </button>
                        </div>

                        <!-- Explanation Content -->
                        <div class="explanation-content">
                            <div class="exp-content active" id="simple-explanation">
                                <!-- Simple story content will be loaded here -->
                            </div>
                            <div class="exp-content" id="advanced-explanation">
                                <!-- Advanced explanation will be loaded here -->
                            </div>
                        </div>
                    </div>

                    <!-- Navigation Buttons -->
                    <div class="verse-navigation">
                        <button class="nav-btn prev-btn" id="prev-btn" onclick="previousVerse()">
                            <i class="fas fa-chevron-left"></i> Previous
                        </button>
                        <button class="nav-btn next-btn" id="next-btn" onclick="nextVerse()">
                            Next <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Scroll to Top Button-->
        <a class="scroll-to-top rounded" href="#page-top"><i class="fas fa-angle-up"></i></a>

        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="assets/js/scripts.js"></script>
        <!-- Teaching Page JS-->
        <script src="assets/js/teaching.js"></script>
    </body>
</html>
